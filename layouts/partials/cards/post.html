<div class="post-card">
  <a href="{{ .RelPermalink | relLangURL }}" class="post-card-link">
    <div class="card">
      <div class="card-head">
        <img class="card-img-top" src='{{ partial "helpers/get-hero.html" . }}'/>
      </div>
      <div class="card-body">
        <h5 class="card-title">{{ .Title }}</h5>
        {{ $desc := .RawContent }}
        {{ $desc = replaceRE "(?s)\\r?\\n---\\r?\\n.*$" "" $desc }}
        {{ $desc = replaceRE "(?s)\\r?\\n###\\s+Overview.*$" "" $desc }}
        {{ $desc = strings.TrimSpace ($desc | markdownify | plainify) }}
        <p class="card-text post-summary">{{ $desc }}</p>
      </div>
      <div class="card-footer">
        <span class="float-left">{{ .Date.Format "January 2, 2006" }}</span>
        <a
        href="{{ .RelPermalink | relLangURL }}"
        class="float-right btn btn-outline-info btn-sm"
        >Read</a
        >
      </div>
    </div>
  </a>
</div>
