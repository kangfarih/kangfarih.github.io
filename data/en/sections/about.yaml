summary: '
Hi, I’m Farih — a Front End Engineer who builds reliable, user-focused products across web, mobile, and interactive applications.
</br></br>
I started my professional journey in 2016 as a Web Front End developer and have since contributed to a wide range of projects, from polished marketing sites to complex web apps and mobile experiences. I’m comfortable owning features end-to-end: translating requirements into clean UI, writing maintainable code, and collaborating closely with designers, backend engineers, and QA to ship with confidence.
</br></br>
I’m passionate about technology and science, and I enjoy learning new tools and patterns that improve both product quality and developer workflow. I’m driven to keep growing, take on meaningful challenges, and deliver solutions that make a real impact.

'

